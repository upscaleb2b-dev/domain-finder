name: 24/7 Domain Scanner

on:
  schedule:
    # Every 5 minutes — GitHub's minimum interval
    # 10 parallel jobs × 300 domains each = 3,000 domains per trigger
    # 288 triggers/day × 3,000 = 864,000 domains/day
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  scan-0:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - name: Worker 0 (primary — manages state)
        run: |
          curl -sf --max-time 90 \
            "${{ secrets.SCANNER_URL }}/api/scan?worker=0&workers=10" \
            -o /dev/null -w "W0 %{http_code} %{time_total}s\n"

  scan-1:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
