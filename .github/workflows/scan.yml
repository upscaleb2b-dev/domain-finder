name: 24/7 Domain Scanner

on:
  schedule:
    # Every 5 minutes — 25 parallel workers × 300 domains = 7,500/trigger
    # 288 triggers/day × 7,500 = 2,160,000 domains/day
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  scan-0:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - run: curl -sf --max-time 90 "${{ secrets.SCANNER_URL }}/api/scan?worker=0&workers=25" -o /dev/null -w "W0 %{http_code} %{time_total}s\n"
  scan-1:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
